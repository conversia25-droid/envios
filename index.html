<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Início</title>

  <link rel="stylesheet" href="theme.css"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .ranking-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }

    .ranking-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ranking-pos {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #0a8f83;
      color: #fff;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .ranking-count {
      font-weight: 700;
    }

    .rank-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 900px) {
      .rank-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
<main class="main-content">

  <header class="page-header">
    <h1>Início</h1>
  </header>

  <!-- KPIs -->
  <section class="summary-grid">
    <div class="summary-item">
      <div class="label">Disparos Hoje</div>
      <div class="value" id="kpi-dia">0</div>
    </div>
    <div class="summary-item">
      <div class="label">Disparos Semana</div>
      <div class="value" id="kpi-semana">0</div>
    </div>
    <div class="summary-item">
      <div class="label">Disparos Mês</div>
      <div class="value" id="kpi-mes">0</div>
    </div>
    <div class="summary-item">
      <div class="label">Instâncias Ativas</div>
      <div class="value" id="instancias-ativas">0</div>
    </div>
  </section>

  <!-- Rankings -->
  <section class="rank-grid">
    <div class="card">
      <h2>Top Instâncias (Hoje)</h2>
      <div id="rank-dia" class="ranking-list"></div>
    </div>
    <div class="card">
      <h2>Top Instâncias (Semana)</h2>
      <div id="rank-semana" class="ranking-list"></div>
    </div>
    <div class="card">
      <h2>Top Instâncias (Mês)</h2>
      <div id="rank-mes" class="ranking-list"></div>
    </div>
  </section>

  <!-- Gráfico -->
  <section class="card" style="margin-top:16px;">
    <h2>Disparos por Período</h2>

    <div style="margin-bottom:10px;">
      <button class="btn btn-outline" onclick="setPeriodo('dia')">Diário</button>
      <button class="btn btn-outline" onclick="setPeriodo('semana')">Semanal</button>
      <button class="btn btn-outline" onclick="setPeriodo('mes')">Mensal</button>
    </div>

    <canvas id="chartEnvios"></canvas>
  </section>

</main>

<script src="auth.js"></script>
<script src="layout.js"></script>

<script>
/* =========================================================
   SUPABASE (já estava no seu arquivo estável)
   ========================================================= */
const supa = AUTH.getSupabaseInfo();
const SB_URL = supa.url;
const HEADERS = AUTH.getSupabaseHeaders();
const TABLE = AUTH.getDisparosTable();

// Busca contagem exata de um período via Content-Range (sem limite)
  async function fetchCount(inicio, fim) {
    const url = `${SB_URL}/rest/v1/${TABLE}?select=id&created_at=gte.${inicio}&created_at=lte.${fim}`;
    const res = await fetch(url, { headers: { ...HEADERS, Prefer: "count=exact" } });
    const range = res.headers.get("content-range");
    return range ? Number(range.split("/")[1]) : 0;
  }

  // Busca registros com instancia (para ranking) de um período — loop paginado sem limite
  async function fetchDisparosPeriodo(inicio, fim) {
    const todos = [];
    let offset = 0;
    const batch = 1000;
    while (true) {
      const url = `${SB_URL}/rest/v1/${TABLE}?select=instancia,created_at&created_at=gte.${inicio}&created_at=lte.${fim}&order=created_at.desc&limit=${batch}&offset=${offset}`;
      const res = await fetch(url, { headers: HEADERS });
      if (!res.ok) break;
      const parte = await res.json();
      if (!parte.length) break;
      todos.push(...parte);
      offset += parte.length;
      if (parte.length < batch) break;
    }
    return todos;
  }


/* =========================================================
   ✅ INSTÂNCIAS ATIVAS (MÍNIMA ALTERAÇÃO)
   - Usa o MESMO caminho da página Instâncias:
     EVOLUTION_API_URL + "instance/fetchInstances" com header apikey
   - Conta SOMENTE "Conectadas" (connectionStatus === "open")
   ========================================================= */

/** (1) mesma lógica do tenant usada no script.js, mas com nomes próprios do index */
function __getTenantCfg_Index() {
  const t = (window.AUTH && AUTH.getTenant && AUTH.getTenant()) || {};
  return {
    EVOLUTION_API_URL: String(t.evolutionApiUrl || "https://evoconversia.zapcompany.com.br").replace(/\/+$/,''),
    API_KEY: t.apiKey || ""
  };
}

/** (2) mesma ideia do api() do script.js, mas isolada para não conflitar */
function apiEvo_Index(path, options = {}) {
  const cfg = __getTenantCfg_Index();
  const cleanedPath = String(path).replace(/^\/+/, "");
  const url = `${cfg.EVOLUTION_API_URL}/${cleanedPath}`;
  const headers = {
    apikey: cfg.API_KEY,
    "Content-Type": "application/json",
    ...(options.headers || {})
  };
  return fetch(url, { mode: "cors", ...options, headers });
}

async function fetchInstanciasAtivas() {
  try {
    const res = await apiEvo_Index("instance/fetchInstances", { method: "GET" });
    if (!res.ok) return 0;

    const list = await res.json();
    const arr = Array.isArray(list) ? list : [];

    // IGUAL À PÁGINA INSTÂNCIAS: "Conectadas" = connectionStatus === "open"
    return arr.filter(i =>
      String(i.connectionStatus || "").toLowerCase() === "open"
    ).length;
  } catch (e) {
    console.error("fetchInstanciasAtivas error:", e);
    return 0;
  }
}

/* ========================================================= */

// Calcula os intervalos de data para cada período
  function calcularIntervalos() {
    const agora = new Date();

    // Hoje
    const inicioDia = new Date(agora); inicioDia.setHours(0,0,0,0);
    const fimDia    = new Date(agora); fimDia.setHours(23,59,59,999);

    // Semana (domingo a sábado)
    const inicioSemana = new Date(agora); inicioSemana.setHours(0,0,0,0);
    inicioSemana.setDate(agora.getDate() - agora.getDay());
    const fimSemana = new Date(inicioSemana);
    fimSemana.setDate(inicioSemana.getDate() + 6);
    fimSemana.setHours(23,59,59,999);

    // Mês
    const inicioMes = new Date(agora.getFullYear(), agora.getMonth(), 1, 0,0,0,0);
    const fimMes    = new Date(agora.getFullYear(), agora.getMonth()+1, 0, 23,59,59,999);

    return {
      dia:    { inicio: inicioDia.toISOString(),    fim: fimDia.toISOString() },
      semana: { inicio: inicioSemana.toISOString(), fim: fimSemana.toISOString() },
      mes:    { inicio: inicioMes.toISOString(),    fim: fimMes.toISOString() }
    };
  }

  function rankingInstancias(data) {
    const m = {};
    data.forEach(d => { const i = d.instancia||"—"; m[i] = (m[i]||0)+1; });
    return Object.entries(m).sort((a,b) => b[1]-a[1]).slice(0,5);
  }

  function renderRanking(id, lista) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    lista.forEach(([inst, qtd], idx) => {
      const div = document.createElement("div");
      div.className = "ranking-item";
      div.innerHTML = `
        <div class="ranking-left">
          <div class="ranking-pos">${idx+1}</div>
          <div>${inst}</div>
        </div>
        <div class="ranking-count">${qtd.toLocaleString('pt-BR')}</div>
      `;
      el.appendChild(div);
    });
    if (!lista.length) el.innerHTML = '<span style="color:#6b7280;font-size:.9rem;">Sem registros</span>';
  }

  async function atualizarResumo() {
    const iv = calcularIntervalos();

    // KPIs: contagem exata via Content-Range (sem trava de limite)
    const [cntDia, cntSemana, cntMes, ativas] = await Promise.all([
      fetchCount(iv.dia.inicio,    iv.dia.fim),
      fetchCount(iv.semana.inicio, iv.semana.fim),
      fetchCount(iv.mes.inicio,    iv.mes.fim),
      fetchInstanciasAtivas()
    ]);

    document.getElementById("kpi-dia").textContent    = cntDia.toLocaleString('pt-BR');
    document.getElementById("kpi-semana").textContent = cntSemana.toLocaleString('pt-BR');
    document.getElementById("kpi-mes").textContent    = cntMes.toLocaleString('pt-BR');
    document.getElementById("instancias-ativas").textContent = ativas;

    // Rankings: busca com paginação para ter todos os registros do período
    const [diaDados, semanaDados, mesDados] = await Promise.all([
      fetchDisparosPeriodo(iv.dia.inicio,    iv.dia.fim),
      fetchDisparosPeriodo(iv.semana.inicio, iv.semana.fim),
      fetchDisparosPeriodo(iv.mes.inicio,    iv.mes.fim)
    ]);

    renderRanking("rank-dia",    rankingInstancias(diaDados));
    renderRanking("rank-semana", rankingInstancias(semanaDados));
    renderRanking("rank-mes",    rankingInstancias(mesDados));
  }

// Cache dos dados já buscados pelo atualizarResumo — evita busca dupla
  let _cacheGrafico = { dia: [], semana: [], mes: [] };

  let chart, periodoAtual = "dia";
  function setPeriodo(p) { periodoAtual = p; renderGrafico(_cacheGrafico[p]); }

  function renderGrafico(dados) {
    const mapa = {};

    if (periodoAtual === "dia") {
      // Agrupa por hora: 00h, 01h ... 23h (garante todas as horas no eixo)
      for (let h = 0; h < 24; h++) mapa[String(h).padStart(2,"0") + "h"] = 0;
      dados.forEach(d => {
        const k = String(new Date(d.created_at).getHours()).padStart(2,"0") + "h";
        mapa[k]++;
      });

    } else if (periodoAtual === "semana") {
      // Agrupa por dia da semana: Dom, Seg... Sab
      const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
      dias.forEach(d => mapa[d] = 0);
      dados.forEach(d => {
        const k = dias[new Date(d.created_at).getDay()];
        mapa[k]++;
      });

    } else {
      // Mês: agrupa por dia (DD/MM) — todos os dados, sem limite
      dados.forEach(d => {
        const dt = new Date(d.created_at);
        const k  = dt.toLocaleDateString("pt-BR", { day:"2-digit", month:"2-digit" });
        mapa[k] = (mapa[k]||0) + 1;
      });
    }

    const labels = Object.keys(mapa);
    const values = Object.values(mapa);

    const ctx = document.getElementById("chartEnvios").getContext("2d");
    if (!chart) {
      chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "Disparos",
            data: values,
            backgroundColor: "rgba(10,143,131,0.7)",
            borderColor: "#0a8f83",
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
        }
      });
    } else {
      chart.data.labels = labels;
      chart.data.datasets[0].data = values;
      chart.update();
    }
  }

  // Sobrescreve atualizarResumo para também popular o cache do gráfico
  const _atualizarResumoOriginal = atualizarResumo;
  atualizarResumo = async function() {
    const iv = calcularIntervalos();

    const [cntDia, cntSemana, cntMes, ativas] = await Promise.all([
      fetchCount(iv.dia.inicio,    iv.dia.fim),
      fetchCount(iv.semana.inicio, iv.semana.fim),
      fetchCount(iv.mes.inicio,    iv.mes.fim),
      fetchInstanciasAtivas()
    ]);

    document.getElementById("kpi-dia").textContent    = cntDia.toLocaleString('pt-BR');
    document.getElementById("kpi-semana").textContent = cntSemana.toLocaleString('pt-BR');
    document.getElementById("kpi-mes").textContent    = cntMes.toLocaleString('pt-BR');
    document.getElementById("instancias-ativas").textContent = ativas;

    const [diaDados, semanaDados, mesDados] = await Promise.all([
      fetchDisparosPeriodo(iv.dia.inicio,    iv.dia.fim),
      fetchDisparosPeriodo(iv.semana.inicio, iv.semana.fim),
      fetchDisparosPeriodo(iv.mes.inicio,    iv.mes.fim)
    ]);

    renderRanking("rank-dia",    rankingInstancias(diaDados));
    renderRanking("rank-semana", rankingInstancias(semanaDados));
    renderRanking("rank-mes",    rankingInstancias(mesDados));

    // Atualiza cache e redesenha gráfico com dados frescos
    _cacheGrafico = { dia: diaDados, semana: semanaDados, mes: mesDados };
    renderGrafico(_cacheGrafico[periodoAtual]);
  };

  atualizarResumo();
  setInterval(atualizarResumo, 10000);
</script>
</body>
</html>
